<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>MyTub</title>
  <meta name="theme-color" content="#5a1f2f">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:linear-gradient(135deg,#5a1f2f 0%,#3d1521 100%);color:#fff;font-family:'DM Sans',system-ui;margin:0;padding:0;min-height:100vh;overflow-x:hidden}
    body.high-contrast{filter:contrast(1.3) brightness(1.1)}
    body.reading-mode{background:#1a1a1a}
    body.reading-mode #content{grid-template-columns:1fr}

    /* PLAYER */
    #player{position:fixed;top:0;left:0;right:0;height:100vh;background:#000;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
    #player.active{opacity:1;pointer-events:auto}
    #playerWrap{position:absolute;inset:0}
    #playerWrap iframe{width:100%;height:100%;border:0;display:block}
    #controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,transparent 100%);padding:40px 20px 20px;display:flex;align-items:center;justify-content:center;gap:16px;transition:opacity .3s;z-index:5}
    #controls.hidden{opacity:0;pointer-events:none}
    .ctrl-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .ctrl-btn:active{background:rgba(255,255,255,.25);transform:scale(.9)}
    .ctrl-btn.play{width:62px;height:62px;font-size:26px;background:rgba(204,0,0,.6)}
    .ctrl-btn.captions.on{background:rgba(204,0,0,.6);border-color:rgba(255,0,0,.6)}
    #closePlayer{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);border-radius:50%;color:#fff;font-size:26px;z-index:6;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* TOP PILL */
    .top-pill{position:fixed;top:15%;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;z-index:10;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 16px;box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap}
    .top-pill-icon{width:36px;height:36px;background:rgba(255,0,0,.6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .top-pill-text{font-size:15px;font-weight:700}
    .top-pill-badge{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.5px}
    .pill-dot{position:absolute;top:-4px;right:30%;width:8px;height:8px;background:#ff6b6b;border-radius:50%;box-shadow:0 0 12px rgba(255,107,107,.8)}
    .refresh-btn-inline{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .refresh-btn-inline:active{background:rgba(255,255,255,.18);transform:scale(.9)}
    .refresh-btn-inline.spinning{animation:spin .6s linear}

    .back-btn{position:fixed;top:15%;left:20px;z-index:11;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer}
    .back-btn.show{display:flex}
    .back-btn:active{background:rgba(255,255,255,.12);transform:scale(.9)}

    /* GRID */
    #content{position:fixed;top:28%;left:50%;transform:translateX(-50%);width:90%;max-width:900px;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:16px;max-height:55vh;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
    #content::-webkit-scrollbar{width:0}
    .glass-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .15s,background .15s;-webkit-user-select:none;user-select:none}
    .glass-card:active,.glass-card.focused{transform:scale(.97);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
    .card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;pointer-events:none}
    .card-body{padding:12px 14px 14px;pointer-events:none}
    .card-title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-channel{font-size:11px;color:rgba(255,255,255,.6)}
    .load-more-btn{grid-column:span 2;padding:16px;text-align:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.8)}
    .load-more-btn:active{background:rgba(255,255,255,.1)}

    /* NAV */
    .bottom-nav{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
    .nav-btn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nav-btn.active{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.2)}
    .nav-btn:active{background:rgba(255,255,255,.1);transform:scale(.9)}

    /* KEYBOARD */
    #keyboard{position:fixed;bottom:0;left:0;right:0;background:rgba(20,10,15,.6);backdrop-filter:blur(30px);padding:12px 8px 20px;display:none;z-index:20;border-top:1px solid rgba(255,255,255,.06)}
    #keyboard.show{display:block}
    .row{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:4px}
    .key{padding:16px 0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#fff;border-radius:10px;font-size:15px;font-weight:700;min-height:50px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .key:active{background:rgba(255,255,255,.14)}
    .wide{grid-column:span 2}.space{grid-column:span 4}.go{background:rgba(204,0,0,.55);grid-column:span 4;border-color:rgba(255,0,0,.4)}
    .searchRow{padding:0 0 8px}
    #q{width:100%;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:14px;font-size:16px;outline:none}

    /* MODALS */
    #browseModal,#quickMenu{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);z-index:50;display:none;align-items:center;justify-content:center}
    #browseModal.show,#quickMenu.show{display:flex}
    .browse-grid,.quick-grid{width:90%;max-width:700px;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
    .browse-item,.quick-item{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:22px;text-align:center;font-weight:600;font-size:14px;cursor:pointer}
    .browse-item:active,.quick-item:active{background:rgba(255,255,255,.1);transform:scale(.97)}
    .quick-item.active{background:rgba(204,0,0,.3);border-color:rgba(255,0,0,.3)}
    .browse-close,.quick-close{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:50%;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center}

    .msg{grid-column:span 2;text-align:center;padding:40px 20px;background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:20px;font-size:14px;color:rgba(255,255,255,.7)}
    .spin-icon{display:inline-block;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .counter{position:fixed;top:22%;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.55);z-index:10;white-space:nowrap}

    .login-box{grid-column:span 2;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px;text-align:center}
    .login-box h2{margin:0 0 20px;font-size:18px}
    .login-box p{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:20px}
    .login-btn{background:rgba(204,0,0,.6);border:none;color:#fff;padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}

    /* GLASSES */
    #glassesOverlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;pointer-events:none;display:none}
    #glassesOverlay.active{display:block}
    #dpad{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:80px 80px 80px;grid-template-rows:80px 80px 80px;gap:4px;pointer-events:auto}
    .dp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;backdrop-filter:blur(12px)}
    .dp.center{background:rgba(204,0,0,.4);border-color:rgba(255,0,0,.4)}
    .dp:active{background:rgba(255,255,255,.18);transform:scale(.93)}
    .dp.empty{background:transparent;border:none;pointer-events:none}
    #glassesModeBtn{position:fixed;top:15%;right:20px;z-index:11;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    #glassesModeBtn.on{background:rgba(204,0,0,.35);border-color:rgba(255,0,0,.4)}
    #voiceBtn{position:fixed;bottom:18%;right:20px;width:60px;height:60px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:26px;z-index:15;cursor:pointer;backdrop-filter:blur(12px)}
    #voiceBtn.show{display:flex}
    #voiceBtn.listening{background:rgba(204,0,0,.5);border-color:rgba(255,0,0,.7);animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,.4)}50%{box-shadow:0 0 0 16px rgba(255,0,0,0)}}
    #toast{position:fixed;top:9%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px 20px;font-size:14px;font-weight:600;z-index:300;display:none;white-space:nowrap;max-width:80vw;text-align:center}
    #toast.show{display:block}
  </style>
</head>
<body>

<div id="player">
  <button id="closePlayer">×</button>
  <div id="playerWrap"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btnBack10">⏪</button>
    <button class="ctrl-btn play" id="btnPlay">⏸</button>
    <button class="ctrl-btn" id="btnForward10">⏩</button>
    <button class="ctrl-btn captions" id="btnCaptions">CC</button>
    <button class="ctrl-btn" id="btnFullscreen">⛶</button>
  </div>
</div>

<button id="glassesModeBtn" title="Glasses Mode">👓</button>
<button class="back-btn" id="backBtn">←</button>

<div class="top-pill">
  <div class="pill-dot"></div>
  <div class="top-pill-icon">▶</div>
  <div class="top-pill-text">MyTub</div>
  <div class="top-pill-badge" id="pillBadge">HOME</div>
  <button class="refresh-btn-inline" id="refreshBtn">⟳</button>
</div>

<div class="counter" id="counter">— / —</div>
<div id="content"><div class="msg"><span class="spin-icon">⟳</span> Loading…</div></div>

<div class="bottom-nav">
  <button class="nav-btn active" id="btnSearch">🔍</button>
  <button class="nav-btn" id="btnLogin">👤</button>
  <button class="nav-btn" id="btnReels">▶️</button>
  <button class="nav-btn" id="btnBrowse">🗂️</button>
  <button class="nav-btn" id="btnHistory">🕐</button>
  <button class="nav-btn" id="btnQuick">⋯</button>
</div>

<div id="keyboard">
  <div class="searchRow"><input id="q" placeholder="Search YouTube…" readonly></div>
</div>

<div id="browseModal">
  <button class="browse-close" id="closeBrowse">×</button>
  <div class="browse-grid" id="browseGrid"></div>
</div>

<div id="quickMenu">
  <button class="quick-close" id="closeQuick">×</button>
  <div class="quick-grid">
    <div class="quick-item" id="qmHome">🏠 Home</div>
    <div class="quick-item" id="qmBack">↩️ Go Back</div>
    <div class="quick-item" id="qmContrast">🎨 Contrast</div>
    <div class="quick-item" id="qmReading">📖 Reading Mode</div>
    <div class="quick-item" id="qmClose">✖️ Close</div>
  </div>
</div>

<div id="glassesOverlay">
  <div id="dpad">
    <div class="dp empty"></div><div class="dp" id="dpUp">▲</div><div class="dp empty"></div>
    <div class="dp" id="dpLeft">◀</div><div class="dp center" id="dpOk">OK</div><div class="dp" id="dpRight">▶</div>
    <div class="dp empty"></div><div class="dp" id="dpDown">▼</div><div class="dp empty"></div>
  </div>
</div>
<button id="voiceBtn">🎙️</button>
<div id="toast"></div>

<script>
'use strict';
// ── CONFIG ──────────────────────────────────────
var KEY     = 'AIzaSyALt-92iBVKYRZLB5tvM7zWOsoMMVaLhAc';
var REGION  = 'US';
var PER_PAGE = 50;

// ── STATE ────────────────────────────────────────
var videos = [], currentIndex = 0, query = '';
var currentTab = 'home', previousTab = 'home';
var nextPageToken = null, currentEndpoint = '';
var loadingMore = false;
var playerIframe = null;       // the live <iframe> element
var isPlaying    = true;
var captionsOn   = false;
var controlsTimeout = null;
var glassesModeOn = false;
var focusedCardIndex = -1;
var contrastOn  = localStorage.getItem('contrast')  === '1';
var readingOn   = localStorage.getItem('reading')   === '1';

if (contrastOn) document.body.classList.add('high-contrast');
if (readingOn)  document.body.classList.add('reading-mode');

// ── DOM ──────────────────────────────────────────
var content      = document.getElementById('content');
var playerEl     = document.getElementById('player');
var playerWrap   = document.getElementById('playerWrap');
var kb           = document.getElementById('keyboard');
var browseModal  = document.getElementById('browseModal');
var quickMenu    = document.getElementById('quickMenu');
var backBtn      = document.getElementById('backBtn');
var refreshBtn   = document.getElementById('refreshBtn');
var controls     = document.getElementById('controls');
var glassesModeBtn = document.getElementById('glassesModeBtn');
var voiceBtn     = document.getElementById('voiceBtn');
var toastEl      = document.getElementById('toast');

// ── CATEGORIES ───────────────────────────────────
var CATEGORIES = [
  {name:'Trending',      ep:'videos?part=snippet&chart=mostPopular'},
  {name:'Shorts',        ep:'search?part=snippet&type=video&videoDuration=short&q=%23shorts'},
  {name:'Music',         ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=10'},
  {name:'Gaming',        ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=20'},
  {name:'Sports',        ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=17'},
  {name:'Movies & Film', ep:'search?part=snippet&type=video&videoDuration=long&q=full+movie'},
  {name:'News',          ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=25'},
  {name:'Comedy',        ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=23'},
  {name:'Education',     ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=27'},
  {name:'Science & Tech',ep:'videos?part=snippet&chart=mostPopular&videoCategoryId=28'}
];

// ── TAP (fixes double-fire: touchend suppresses follow-up click) ──
function tap(el, fn) {
  if (!el) return;
  var sx=0, sy=0, moved=false, didTouch=false;
  el.addEventListener('touchstart', function(e){
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false; didTouch=false;
  },{passive:true});
  el.addEventListener('touchmove', function(e){
    if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10) moved=true;
  },{passive:true});
  el.addEventListener('touchend', function(e){
    if(!moved){ e.preventDefault(); didTouch=true; fn(); }
  });
  el.addEventListener('click', function(e){
    if(didTouch){ didTouch=false; return; }
    fn();
  });
}

// ── BUILD KEYBOARD ───────────────────────────────
[['q','w','e','r','t','y','u','i','o','p'],
 ['a','s','d','f','g','h','j','k','l'],
 ['z','x','c','v','b','n','m','⌫'],
 ['123','space','Enter']
].forEach(function(keys,i){
  var row=document.createElement('div'); row.className='row';
  if(i===1) row.style.padding='0 5%';
  if(i===2) row.style.padding='0 15%';
  keys.forEach(function(k){
    var b=document.createElement('button'); b.className='key';
    b.textContent= k==='space'?'space':k;
    if(k==='⌫'||k==='123') b.className+=' wide';
    if(k==='space') b.className+=' space';
    if(k==='Enter') b.className+=' go';
    tap(b,function(){ keyPress(k); });
    row.appendChild(b);
  });
  kb.appendChild(row);
});

// ── BUILD BROWSE GRID ────────────────────────────
CATEGORIES.forEach(function(c){
  var d=document.createElement('div'); d.className='browse-item'; d.textContent=c.name;
  tap(d,function(){ browseCategory(c); });
  document.getElementById('browseGrid').appendChild(d);
});

// ── WIRE BUTTONS ─────────────────────────────────
tap(document.getElementById('btnSearch'),  showKB);
tap(document.getElementById('btnLogin'),   showLogin);
tap(document.getElementById('btnReels'),   loadReels);
tap(document.getElementById('btnBrowse'),  function(){browseModal.classList.add('show');showBackBtn();setTab('btnBrowse');});
tap(document.getElementById('btnHistory'), loadHistory);
tap(document.getElementById('btnQuick'),   showQuickMenu);
tap(document.getElementById('closeBrowse'),function(){browseModal.classList.remove('show');hideBackBtn();});
tap(document.getElementById('closeQuick'), function(){quickMenu.classList.remove('show');});
tap(document.getElementById('closePlayer'),closePlayer);
tap(backBtn,   goHome);
tap(refreshBtn,refreshCurrent);

tap(document.getElementById('qmHome'),    function(){quickMenu.classList.remove('show');goHome();});
tap(document.getElementById('qmBack'),    function(){quickMenu.classList.remove('show');goBackToPrev();});
tap(document.getElementById('qmContrast'),toggleContrast);
tap(document.getElementById('qmReading'), toggleReading);
tap(document.getElementById('qmClose'),   function(){quickMenu.classList.remove('show');});

tap(document.getElementById('btnPlay'),      playerTogglePlay);
tap(document.getElementById('btnBack10'),    function(){playerSeek(-10);});
tap(document.getElementById('btnForward10'), function(){playerSeek(10);});
tap(document.getElementById('btnCaptions'),  playerToggleCaptions);
tap(document.getElementById('btnFullscreen'),playerToggleFullscreen);
tap(playerEl, showCtrlsTemp);

tap(glassesModeBtn, toggleGlassesMode);
tap(voiceBtn, startVoice);
tap(document.getElementById('dpUp'),   function(){scrollGrid(-2);});
tap(document.getElementById('dpDown'), function(){scrollGrid(2);});
tap(document.getElementById('dpLeft'), function(){moveFocus(-1);});
tap(document.getElementById('dpRight'),function(){moveFocus(1);});
tap(document.getElementById('dpOk'),   activateFocused);

// ── NAV HELPERS ──────────────────────────────────
function setTab(id){
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if(id){var el=document.getElementById(id);if(el)el.classList.add('active');}
}
function setPill(txt){document.getElementById('pillBadge').textContent=txt;}
function showBackBtn(){if(currentTab!=='home')backBtn.classList.add('show');}
function hideBackBtn(){backBtn.classList.remove('show');}

function goHome(){
  previousTab=currentTab; hideBackBtn();
  browseModal.classList.remove('show'); quickMenu.classList.remove('show');
  currentTab='home'; setTab('btnSearch'); setPill('HOME'); loadHome();
}
function goBackToPrev(){
  if(previousTab==='home') goHome();
  else if(previousTab==='login') showLogin();
  else if(previousTab==='reels') loadReels();
  else if(previousTab==='browse') browseModal.classList.add('show');
  else if(previousTab==='history') loadHistory();
  else if(previousTab==='search') showKB();
}
function showKB(){
  previousTab=currentTab; query=''; document.getElementById('q').value='';
  kb.classList.add('show'); setTab('btnSearch'); hideBackBtn(); vibe(8);
}
function hideKB(){kb.classList.remove('show');}
function showLogin(){
  previousTab=currentTab; setTab('btnLogin'); hideKB(); showBackBtn();
  currentTab='login'; setPill('ACCOUNT');
  content.innerHTML='<div class="login-box"><h2>Sign in to MyTub</h2><p>Sync history, playlists and subscriptions.</p><button class="login-btn">Sign in with Google</button><p style="margin-top:16px;font-size:11px;opacity:.5">OAuth not implemented yet</p></div>';
  document.getElementById('counter').textContent='—';
}
function showQuickMenu(){
  previousTab=currentTab; quickMenu.classList.add('show'); setTab('btnQuick');
  document.getElementById('qmContrast').classList.toggle('active',contrastOn);
  document.getElementById('qmReading').classList.toggle('active',readingOn);
}
function toggleContrast(){
  contrastOn=!contrastOn; document.body.classList.toggle('high-contrast',contrastOn);
  document.getElementById('qmContrast').classList.toggle('active',contrastOn);
  localStorage.setItem('contrast',contrastOn?'1':'0'); vibe(8);
}
function toggleReading(){
  readingOn=!readingOn; document.body.classList.toggle('reading-mode',readingOn);
  document.getElementById('qmReading').classList.toggle('active',readingOn);
  localStorage.setItem('reading',readingOn?'1':'0'); showGrid(false); vibe(8);
}
function vibe(p){if(navigator.vibrate)navigator.vibrate(p);}

function keyPress(k){
  vibe(8);
  if(k==='⌫') query=query.slice(0,-1);
  else if(k==='space') query+=' ';
  else if(k==='Enter'){ hideKB(); if(query.trim()) doSearch(); return; }
  else if(k!=='123') query+=k;
  document.getElementById('q').value=query;
}

// ── API HELPERS ──────────────────────────────────
function apiUrl(ep, token){
  var sep=ep.indexOf('?')>-1?'&':'?';
  var u='https://www.googleapis.com/youtube/v3/'+ep+sep+'key='+KEY+'&maxResults='+PER_PAGE+'&regionCode='+REGION;
  if(token) u+='&pageToken='+encodeURIComponent(token);
  return u;
}
function parseItems(items){
  return (items||[]).map(function(v){
    var id=(v.id&&v.id.videoId)?v.id.videoId:(typeof v.id==='string'?v.id:null);
    return {id:id,title:(v.snippet&&v.snippet.title)||'—',channel:(v.snippet&&v.snippet.channelTitle)||'—'};
  }).filter(function(v){return !!v.id;});
}

// ── LOAD FUNCTIONS ───────────────────────────────
function loadHome(){
  currentTab='home'; currentEndpoint='videos?part=snippet&chart=mostPopular';
  nextPageToken=null; hideBackBtn(); setTab('btnSearch'); setPill('HOME');
  content.innerHTML='<div class="msg"><span class="spin-icon">⟳</span> Loading…</div>';
  fetchVideos(currentEndpoint,null,false);
}
function loadReels(){
  previousTab=currentTab; setTab('btnReels'); hideKB(); showBackBtn();
  currentTab='reels'; currentEndpoint='search?part=snippet&type=video&videoDuration=short&q=%23shorts';
  nextPageToken=null; setPill('SHORTS');
  content.innerHTML='<div class="msg"><span class="spin-icon">⟳</span> Loading Shorts…</div>';
  fetchVideos(currentEndpoint,null,false);
}
function loadHistory(){
  previousTab=currentTab; setTab('btnHistory'); hideKB(); showBackBtn();
  currentTab='history'; currentEndpoint=''; nextPageToken=null; setPill('HISTORY');
  var h=JSON.parse(localStorage.getItem('mytub_history')||'[]');
  if(!h.length){
    content.innerHTML='<div class="msg">No history yet</div>';
    document.getElementById('counter').textContent='0 videos'; return;
  }
  videos=h; currentIndex=0; showGrid(true);
}
function browseCategory(cat){
  previousTab=currentTab; browseModal.classList.remove('show'); hideKB(); showBackBtn();
  currentTab='browse'; currentEndpoint=cat.ep; nextPageToken=null;
  setPill(cat.name.toUpperCase());
  content.innerHTML='<div class="msg"><span class="spin-icon">⟳</span> Loading '+cat.name+'…</div>';
  fetchVideos(currentEndpoint,null,false);
}
function doSearch(){
  previousTab=currentTab; currentTab='search'; setTab(''); showBackBtn();
  var q=query.trim();
  currentEndpoint='search?part=snippet&type=video&order=relevance&safeSearch=moderate&q='+encodeURIComponent(q);
  nextPageToken=null; setPill('SEARCH');
  content.innerHTML='<div class="msg"><span class="spin-icon">⟳</span> Searching…</div>';
  fetchVideos(currentEndpoint,null,false);
}

// ── FETCH VIDEOS ─────────────────────────────────
// FIX: auto-chains page 2 immediately so you get 50-100 videos on first load
function fetchVideos(ep, token, append){
  if(loadingMore) return;
  loadingMore=true;
  fetch(apiUrl(ep,token))
    .then(function(r){return r.json();})
    .then(function(d){
      loadingMore=false;
      if(d.error) throw new Error(d.error.message||'API error');
      if(!d.items||!d.items.length) throw new Error('No results');
      var page=parseItems(d.items);
      nextPageToken=d.nextPageToken||null;
      if(append){ videos=videos.concat(page); }
      else { videos=page; currentIndex=0; }
      showGrid(!append);
      // AUTO-CHAIN: immediately fetch page 2 to push past the 25-video limit
      if(!append && nextPageToken && ep===currentEndpoint){
        fetchVideos(ep,nextPageToken,true);
      }
    })
    .catch(function(e){
      loadingMore=false;
      if(!append){
        videos=[
          {id:'dQw4w9WgXcQ',title:'Rick Astley – Never Gonna Give You Up',channel:'Rick Astley'},
          {id:'jNQXAC9IVRw',title:'Me at the zoo',channel:'jawed'},
          {id:'9bZkp7q19f0',title:'Gangnam Style',channel:'officialpsy'}
        ];
        currentIndex=0; showGrid(true);
        showToast('⚠ API unavailable – showing fallback');
      } else {
        showToast('⚠ Could not load more');
      }
    });
}

function refreshCurrent(){
  vibe(8);
  refreshBtn.classList.add('spinning');
  setTimeout(function(){refreshBtn.classList.remove('spinning');},600);
  nextPageToken=null; videos=[];
  if(currentTab==='home') loadHome();
  else if(currentTab==='reels') loadReels();
  else if(currentTab==='history') loadHistory();
  else if(currentTab==='search'&&query) doSearch();
  else if(currentTab==='browse'&&currentEndpoint){
    content.innerHTML='<div class="msg"><span class="spin-icon">⟳</span> Refreshing…</div>';
    fetchVideos(currentEndpoint,null,false);
  } else if(currentTab==='login') showLogin();
}

function loadMore(){
  if(!nextPageToken||loadingMore||!currentEndpoint) return;
  var btn=content.querySelector('.load-more-btn');
  if(btn) btn.textContent='⟳ Loading…';
  fetchVideos(currentEndpoint,nextPageToken,true);
}

// ── SHOW GRID ────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showGrid(reset){
  if(!videos.length) return;
  if(reset){ content.innerHTML=''; focusedCardIndex=-1; }
  else{ var ob=content.querySelector('.load-more-btn'); if(ob) ob.remove(); }

  var frag=document.createDocumentFragment();
  videos.forEach(function(v,i){
    if(content.querySelector('[data-vid="'+v.id+'"]')) return;
    var card=document.createElement('div');
    card.className='glass-card';
    card.setAttribute('data-vid',v.id);
    card.setAttribute('data-idx',i);
    card.innerHTML=
      '<img class="card-thumb" src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" loading="lazy">'
      +'<div class="card-body"><div class="card-title">'+esc(v.title)+'</div>'
      +'<div class="card-channel">'+esc(v.channel)+'</div></div>';
    tap(card,(function(vid,vd){return function(){playVideo(vid,vd);};})(v.id,v));
    frag.appendChild(card);
  });
  content.appendChild(frag);

  if(nextPageToken){
    var btn=document.createElement('div');
    btn.className='load-more-btn'; btn.textContent='⬇ Load More';
    tap(btn,loadMore); content.appendChild(btn);
  }
  document.getElementById('counter').textContent=videos.length+' videos'+(nextPageToken?' · more available':'');
  content.onscroll=function(){
    if(content.scrollTop+content.clientHeight>=content.scrollHeight-300&&nextPageToken&&!loadingMore) loadMore();
  };
}

// ── PLAYER (direct iframe — no YT IFrame API, no Script errors) ─────────────
// Uses YouTube's standard embed URL with postMessage for play/pause/seek control.
// Works on any domain, any protocol, any network.
function saveHistory(v){
  var h=JSON.parse(localStorage.getItem('mytub_history')||'[]');
  h=h.filter(function(x){return x.id!==v.id;});
  h.unshift(v); if(h.length>100) h=h.slice(0,100);
  localStorage.setItem('mytub_history',JSON.stringify(h));
}

function playVideo(id, videoData){
  vibe([10,20,10]);
  var v=videoData||{id:id,title:'',channel:''};
  saveHistory(v);

  // Remove old iframe if any
  playerWrap.innerHTML='';
  captionsOn=false;
  document.getElementById('btnCaptions').classList.remove('on');

  // Build embed URL
  // enablejsapi=1 allows postMessage control (play/pause/seek)
  var src='https://www.youtube.com/embed/'+id
    +'?autoplay=1'
    +'&playsinline=1'
    +'&rel=0'
    +'&enablejsapi=1'
    +'&cc_load_policy=0'
    +'&modestbranding=1';

  var iframe=document.createElement('iframe');
  iframe.src=src;
  iframe.setAttribute('allowfullscreen','');
  iframe.setAttribute('allow','autoplay; fullscreen; picture-in-picture');
  iframe.style.cssText='width:100%;height:100%;border:0;display:block;';
  playerWrap.appendChild(iframe);
  playerIframe=iframe;
  isPlaying=true;
  document.getElementById('btnPlay').textContent='⏸';

  playerEl.classList.add('active');
  showCtrlsTemp();
}

// postMessage helper — sends YT iframe player commands
function ytCmd(fn, args){
  if(!playerIframe||!playerIframe.contentWindow) return;
  playerIframe.contentWindow.postMessage(
    JSON.stringify({event:'command',func:fn,args:args||[]}),
    '*'
  );
}

function playerTogglePlay(){
  if(!playerIframe) return;
  if(isPlaying){ ytCmd('pauseVideo'); isPlaying=false; document.getElementById('btnPlay').textContent='▶'; }
  else { ytCmd('playVideo'); isPlaying=true; document.getElementById('btnPlay').textContent='⏸'; }
  showCtrlsTemp();
}
function playerSeek(delta){
  if(!playerIframe) return;
  // seekBy isn't a standard YT postMessage command; use getCurrentTime via message + seekTo
  // Fallback: ask the iframe for currentTime via postMessage listener
  pendingSeekDelta=delta;
  playerIframe.contentWindow.postMessage(JSON.stringify({event:'listening'}),'*');
  ytCmd('getCurrentTime');
  showCtrlsTemp();
}
var pendingSeekDelta=0;
window.addEventListener('message',function(e){
  if(!playerIframe||e.source!==playerIframe.contentWindow) return;
  try{
    var d=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(d&&d.event==='infoDelivery'&&d.info&&typeof d.info.currentTime==='number'&&pendingSeekDelta!==0){
      var t=Math.max(0,d.info.currentTime+pendingSeekDelta);
      ytCmd('seekTo',[t,true]);
      pendingSeekDelta=0;
    }
    // Track play state from player
    if(d&&d.event==='onStateChange'){
      if(d.info===1){ isPlaying=true; document.getElementById('btnPlay').textContent='⏸'; }
      if(d.info===2){ isPlaying=false; document.getElementById('btnPlay').textContent='▶'; }
      if(d.info===0){ autoNextVideo(); } // ended
    }
  }catch(err){}
});

function autoNextVideo(){
  var next=(currentIndex+1)%videos.length;
  if(videos[next]){ currentIndex=next; playVideo(videos[next].id,videos[next]); }
}

function playerToggleCaptions(){
  if(!playerIframe) return;
  captionsOn=!captionsOn;
  if(captionsOn) ytCmd('loadModule',['captions']);
  else ytCmd('unloadModule',['captions']);
  document.getElementById('btnCaptions').classList.toggle('on',captionsOn);
  showCtrlsTemp();
}
function playerToggleFullscreen(){
  if(!document.fullscreenElement) playerEl.requestFullscreen().catch(function(){});
  else document.exitFullscreen();
  showCtrlsTemp();
}
function showCtrlsTemp(){
  controls.classList.remove('hidden');
  clearTimeout(controlsTimeout);
  controlsTimeout=setTimeout(function(){
    if(document.fullscreenElement&&isPlaying) controls.classList.add('hidden');
  },3000);
}
function closePlayer(){
  playerWrap.innerHTML=''; playerIframe=null; isPlaying=false;
  playerEl.classList.remove('active');
  if(document.fullscreenElement) document.exitFullscreen();
  vibe(8);
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement) controls.classList.remove('hidden');
});

// ── TOAST ────────────────────────────────────────
var toastTimer=null;
function showToast(msg){
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){toastEl.classList.remove('show');},2500);
}

// ── GLASSES MODE ─────────────────────────────────
function toggleGlassesMode(){
  glassesModeOn=!glassesModeOn;
  glassesModeBtn.classList.toggle('on',glassesModeOn);
  document.getElementById('glassesOverlay').classList.toggle('active',glassesModeOn);
  voiceBtn.classList.toggle('show',glassesModeOn);
  vibe(glassesModeOn?[20,10,20]:20);
  showToast(glassesModeOn?'👓 Glasses mode ON':'👓 Glasses mode OFF');
  if(glassesModeOn) setupSwipe();
}
function moveFocus(d){
  var cards=Array.from(content.querySelectorAll('.glass-card')); if(!cards.length) return;
  if(focusedCardIndex<0) focusedCardIndex=0; else focusedCardIndex=Math.max(0,Math.min(cards.length-1,focusedCardIndex+d));
  cards.forEach(function(c,i){c.classList.toggle('focused',i===focusedCardIndex);});
  cards[focusedCardIndex].scrollIntoView({block:'nearest',behavior:'smooth'});
  vibe(8);
}
function scrollGrid(d){content.scrollBy({top:d*80,behavior:'smooth'});}
function activateFocused(){
  if(focusedCardIndex>=0&&videos[focusedCardIndex]){vibe([10,20,10]);playVideo(videos[focusedCardIndex].id,videos[focusedCardIndex]);}
}
var swSX=0,swSY=0;
function setupSwipe(){
  document.addEventListener('touchstart',function(e){swSX=e.touches[0].clientX;swSY=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',function(e){
    if(quickMenu.classList.contains('show')||browseModal.classList.contains('show')) return;
    var dx=e.changedTouches[0].clientX-swSX, dy=e.changedTouches[0].clientY-swSY;
    if(Math.max(Math.abs(dx),Math.abs(dy))<60) return;
    if(Math.abs(dx)>Math.abs(dy)){
      if(playerEl.classList.contains('active')){ playerSeek(dx>0?-10:10); showToast(dx>0?'⏪ -10s':'⏩ +10s'); }
      else moveFocus(dx>0?-1:1);
    } else {
      scrollGrid(dy>0?3:-3);
    }
  },{passive:true});
}

// ── VOICE COMMANDS ───────────────────────────────
var recognition=null;
function startVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('⚠ Voice not supported');return;}
  if(!recognition){
    recognition=new SR(); recognition.continuous=false; recognition.interimResults=false; recognition.lang='en-US';
    recognition.onresult=function(e){ var cmd=e.results[0][0].transcript.toLowerCase().trim(); showToast('🎙 "'+cmd+'"'); handleVoice(cmd); };
    recognition.onend=function(){voiceBtn.classList.remove('listening');};
    recognition.onerror=function(e){voiceBtn.classList.remove('listening');showToast('🎙 '+e.error);};
  }
  voiceBtn.classList.add('listening'); vibe([10,10,10]); recognition.start();
}
function handleVoice(cmd){
  vibe(15);
  if(/\b(home)\b/.test(cmd)){goHome();return;}
  if(/\brefresh\b/.test(cmd)){refreshCurrent();return;}
  if(/\b(search|find|look)\b/.test(cmd)){var q=cmd.replace(/\b(search|find|look for|look up|for)\b/gi,'').trim();if(q){query=q;doSearch();}else showKB();return;}
  if(/\b(play|ok|select|open)\b/.test(cmd)){activateFocused();return;}
  if(/\b(pause|stop)\b/.test(cmd)){if(isPlaying)playerTogglePlay();return;}
  if(/\b(resume|continue)\b/.test(cmd)){if(!isPlaying)playerTogglePlay();return;}
  if(/\b(close|exit)\b/.test(cmd)){if(playerEl.classList.contains('active'))closePlayer();return;}
  if(/\b(next|right)\b/.test(cmd)){moveFocus(1);return;}
  if(/\b(previous|prev|left)\b/.test(cmd)){moveFocus(-1);return;}
  if(/\b(down)\b/.test(cmd)){scrollGrid(3);return;}
  if(/\b(up)\b/.test(cmd)){scrollGrid(-3);return;}
  if(/\b(shorts|reels)\b/.test(cmd)){loadReels();return;}
  if(/\b(history)\b/.test(cmd)){loadHistory();return;}
  if(/\bfullscreen\b/.test(cmd)){playerToggleFullscreen();return;}
  if(/\b(skip back|rewind)\b/.test(cmd)){playerSeek(-10);return;}
  if(/\b(skip)\b/.test(cmd)){playerSeek(10);return;}
  if(cmd.length>2){query=cmd;doSearch();}
}

// ── HARDWARE KEYS ────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'){moveFocus(1);e.preventDefault();}
  else if(e.key==='ArrowLeft'){moveFocus(-1);e.preventDefault();}
  else if(e.key==='ArrowDown'){scrollGrid(2);e.preventDefault();}
  else if(e.key==='ArrowUp'){scrollGrid(-2);e.preventDefault();}
  else if(e.key==='Enter'||e.key===' '){activateFocused();e.preventDefault();}
  else if(e.key==='Escape'){if(playerEl.classList.contains('active'))closePlayer();}
});

// ── BOOT ─────────────────────────────────────────
loadHome();
</script>
